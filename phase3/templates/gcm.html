<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>AES-GCM — Phase 3</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:monospace;background:#0d1117;color:#c9d1d9;font-size:.88rem}
h1{color:#3fb950;font-size:1.2rem;margin-bottom:.1rem}
h2{color:#58a6ff;font-size:.92rem;font-weight:bold;margin-bottom:.5rem}
h3{color:#e3b341;font-size:.82rem;font-weight:bold;margin-bottom:.35rem}

/* ── Top header ── */
.top-header{padding:.9rem 1.4rem .4rem;border-bottom:1px solid #21262d}

/* ── Tab bar ── */
.tab-bar{display:flex;border-bottom:2px solid #21262d;background:#0d1117;
         padding:0 1.4rem;position:sticky;top:0;z-index:100}
.tab-btn{padding:.65rem 1.2rem;cursor:pointer;font-family:monospace;font-size:.82rem;
         font-weight:bold;border:none;background:transparent;color:#8b949e;
         border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s}
.tab-btn:hover{color:#c9d1d9;background:#161b22}
.tab-btn.active{color:#3fb950;border-bottom-color:#3fb950}
.tab-content{display:none;padding:1.2rem 1.4rem}
.tab-content.active{display:block}

/* ── Alerts ── */
.safe-banner{background:#122d22;border:1px solid #3fb950;padding:.55rem .9rem;
             border-radius:6px;margin-bottom:1rem;font-size:.8rem;color:#7ee787}
.warning{background:#3d1a1a;border:1px solid #f85149;padding:.55rem .9rem;
         border-radius:6px;margin-bottom:1rem;font-size:.8rem;color:#ffa198}
.info{background:#111d2e;border:1px solid #58a6ff;padding:.45rem .8rem;
      border-radius:6px;font-size:.78rem;color:#79c0ff;margin:.4rem 0}
.note-box{background:#1e1a2e;border:1px solid #a78bfa;padding:.55rem .9rem;
          border-radius:6px;font-size:.8rem;color:#c4b5fd;margin:.4rem 0}

/* ── Layout ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
@media(max-width:1000px){.grid3{grid-template-columns:1fr 1fr}}
@media(max-width:700px){.grid2,.grid3{grid-template-columns:1fr}}
.panel{background:#161b22;border:1px solid #21262d;border-radius:8px;
       padding:.9rem;margin-bottom:1rem}

/* ── Forms ── */
input{width:100%;padding:.4rem .6rem;border-radius:5px;border:1px solid #30363d;
      background:#0d1117;color:#c9d1d9;font-family:monospace;font-size:.85rem;margin-bottom:.5rem}
button{padding:.42rem 1rem;border-radius:5px;cursor:pointer;font-family:monospace;
       font-size:.82rem;font-weight:bold;border:none;margin-right:.4rem;margin-bottom:.3rem}
.btn-green{background:#238636;color:#fff}.btn-green:hover{background:#2ea043}
.btn-red  {background:#b91c1c;color:#fff}.btn-red:hover{background:#dc2626}
.btn-blue {background:#1d4ed8;color:#fff}.btn-blue:hover{background:#2563eb}
.btn-amber{background:#92400e;color:#fff}.btn-amber:hover{background:#b45309}
button:disabled{background:#21262d;color:#6b7280;cursor:not-allowed}
label.field-label{color:#8b949e;font-size:.78rem;display:block;margin-bottom:.2rem}

/* ── Value display boxes ── */
.val-box{border-radius:6px;padding:.55rem .8rem;font-size:.8rem;
         word-break:break-all;line-height:1.6;margin:.3rem 0;min-height:36px}
.vb-green {background:#0a1a0e;border:1px solid #3fb950;color:#3fb950}
.vb-blue  {background:#0a0e1a;border:1px solid #58a6ff;color:#58a6ff}
.vb-amber {background:#1a130a;border:1px solid #e3b341;color:#e3b341}
.vb-purple{background:#110e1a;border:1px solid #a78bfa;color:#a78bfa}
.vb-red   {background:#1a0a0a;border:1px solid #f85149;color:#f85149}
.vb-dim   {background:#161b22;border:1px solid #30363d;color:#8b949e}

/* ── Step pipeline ── */
.pipeline{display:flex;flex-direction:column;gap:.5rem;margin:1rem 0}
.pipe-step{background:#161b22;border:1px solid #21262d;border-radius:8px;
           padding:.8rem 1rem;border-left:4px solid #30363d;
           transition:border-left-color .4s,background .4s;opacity:.4}
.pipe-step.active  {border-left-color:#e3b341;background:#1a1500;opacity:1}
.pipe-step.complete{border-left-color:#3fb950;background:#0a1a0e;opacity:1}
.pipe-step.failed  {border-left-color:#f85149;background:#1a0a0a;opacity:1}
.pipe-header{display:flex;align-items:center;gap:.6rem;margin-bottom:.35rem}
.pipe-icon{font-size:1rem}
.pipe-title{font-size:.85rem;font-weight:bold;color:#c9d1d9}
.pipe-status{margin-left:auto;font-size:.72rem;padding:2px 8px;border-radius:4px;font-weight:bold}
.ps-waiting {background:#21262d;color:#6b7280}
.ps-running {background:#2d1f0a;color:#e3b341}
.ps-done    {background:#122d22;color:#3fb950}
.ps-failed  {background:#3d1a1a;color:#f85149}
.pipe-body{font-size:.78rem;color:#8b949e;line-height:1.6}
.pipe-body strong{color:#c9d1d9}
.pipe-value{margin-top:.3rem}

/* ── How It Works ── */
.step-card{background:#161b22;border:1px solid #21262d;border-radius:8px;
           padding:1rem;margin-bottom:.8rem;position:relative;border-left:4px solid #58a6ff}
.step-card.green {border-left-color:#3fb950}
.step-card.red   {border-left-color:#f85149}
.step-card.amber {border-left-color:#e3b341}
.step-card.purple{border-left-color:#a78bfa}
.step-num{position:absolute;top:.8rem;right:.8rem;font-size:1.6rem;font-weight:bold;color:#21262d}
.step-title{font-size:.9rem;font-weight:bold;margin-bottom:.4rem}
.step-body{font-size:.8rem;color:#8b949e;line-height:1.6}
.step-body strong{color:#c9d1d9}
.code-block{background:#0d1117;border:1px solid #21262d;border-radius:6px;
            padding:.7rem;font-size:.78rem;color:#8b949e;margin:.5rem 0;
            white-space:pre-wrap;line-height:1.5}
.hl-green{color:#3fb950}.hl-blue{color:#58a6ff}.hl-amber{color:#e3b341}
.hl-red{color:#f85149}.hl-purple{color:#a78bfa}
.flow-arrow{text-align:center;color:#30363d;font-size:1.2rem;margin:.2rem 0}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:700px){.two-col{grid-template-columns:1fr}}
.divider{border:none;border-top:1px solid #21262d;margin:1rem 0}

/* ── Result banner ── */
.result-banner{border-radius:8px;padding:1rem;text-align:center;font-size:.95rem;
               font-weight:bold;margin-bottom:1rem;display:none}
.rb-success{background:#122d22;border:2px solid #3fb950;color:#3fb950}
.rb-fail   {background:#3d1a1a;border:2px solid #f85149;color:#f85149}

/* ── Compare table ── */
.cmp-table{width:100%;border-collapse:collapse;font-size:.8rem;margin-top:.5rem}
.cmp-table th{background:#161b22;color:#8b949e;padding:.4rem .6rem;
              text-align:left;border-bottom:1px solid #21262d;font-weight:bold}
.cmp-table td{padding:.4rem .6rem;border-bottom:1px solid #161b22;vertical-align:top}
.cmp-table tr:hover td{background:#161b2280}
.td-cbc{color:#f85149}.td-gcm{color:#3fb950}

/* ── Misc ── */
.dim{color:#8b949e}.green{color:#3fb950}.red{color:#f85149}
.blue{color:#58a6ff}.yellow{color:#e3b341}.purple{color:#a78bfa}
.bold{font-weight:bold}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.72rem;font-weight:bold;margin-right:.3rem}
.badge-green{background:#122d22;border:1px solid #3fb950;color:#7ee787}
.badge-red  {background:#3d1a1a;border:1px solid #f85149;color:#ffa198}
.badge-blue {background:#111d2e;border:1px solid #58a6ff;color:#79c0ff}
.badge-amber{background:#2d1f0a;border:1px solid #e3b341;color:#fcd34d}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid #30363d;
         border-top-color:#3fb950;border-radius:50%;
         animation:spin .7s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- ── Top Header ─────────────────────────────────────────────── -->
<div class="top-header">
  <h1>🛡️ AES-GCM Secure Server — Phase 3</h1>
  <p class="dim" style="font-size:.78rem;margin-top:.2rem">
    AES-256-GCM &nbsp;·&nbsp; Authenticated Encryption &nbsp;·&nbsp;
    Port 5001 &nbsp;·&nbsp;
    <span class="green bold">Padding oracle impossible</span>
  </p>
</div>

<!-- ── Tab Bar ────────────────────────────────────────────────── -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('encrypt', this)">🔒 Encryption</button>
  <button class="tab-btn"        onclick="switchTab('decrypt', this)">🔓 Decryption</button>
  <button class="tab-btn"        onclick="switchTab('howit',   this)">📖 How It Works</button>
</div>

<!-- ── Tab Contents ───────────────────────────────────────────── -->
<div id="tab-encrypt" class="tab-content active">
  {% include "tabs/tab_encrypt.html" %}
</div>
<div id="tab-decrypt" class="tab-content">
  {% include "tabs/tab_decrypt.html" %}
</div>
<div id="tab-howit" class="tab-content">
  {% include "tabs/tab_howit.html" %}
</div>

<!-- ── Shared JS ──────────────────────────────────────────────── -->
<script src="{{ url_for('static', filename='js/tab_encrypt.js') }}"></script>
<script src="{{ url_for('static', filename='js/tab_decrypt.js') }}"></script>
<script>
function switchTab(name, btn) {
  document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("tab-" + name).classList.add("active");
  btn.classList.add("active");
}
</script>

</body>
</html>
